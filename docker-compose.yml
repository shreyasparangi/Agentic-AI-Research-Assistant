version: '3.8'

services:
  backend:
    build: ./backend
    container_name: agentic_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # CRITICAL: This maps your local ChromaDB folder to the container. 
      # Without this, your RAG database would be wiped every time the container restarts!
      - ./backend/chroma_db:/app/chroma_db

  frontend:
    build: ./frontend
    container_name: agentic_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend